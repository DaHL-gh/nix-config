# settings
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u

# layout
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"

set -g window-status-format "#I-#W"
set -g window-status-current-format "#I-#W"
set -g window-status-current-style "fg=green bold"

set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,} %H:%M %d-%b-%y"

set -g status-left " #{session_name} | #{=21:pane_title}"
set -g status-left-length 999
set -g status-right-length 999

# bindings
set -g prefix C-b
# unbind C-b
# bind C-b send-prefix

bind r source-file ~/.config/tmux/tmux.conf ; display-message "Config reloaded"

## windows
bind -n M-Enter new-window
bind -n M-, previous-window
bind -n M-. next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

## panes
bind -n M-q kill-pane
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 3
bind -n C-M-k resize-pane -U 3
bind -n C-M-l resize-pane -R 5

## layouts
bind -n M-\\ split-window -h
bind -n M-- split-window -v

## scripts
bind -n M-f run "tmux neww ~/.config/tmux/scripts/tmux-session-swapper.sh pick"
bind H switch-client -t workspace
bind -n M-k run "tmux neww ~/.config/tmux/scripts/tmux-session-swapper.sh kill"
